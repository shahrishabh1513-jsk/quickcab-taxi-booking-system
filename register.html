<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - QuickCab</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Same styles as login.html -->
    <style>
        /* Copy all styles from login.html */
        .auth-page { /* ... */ }
        /* ... */
    </style>
</head>
<body>
    <div id="navbar"></div>

    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <img src="images/logo.png" alt="QuickCab">
                    <h2>Create Account</h2>
                    <p>Join QuickCab today</p>
                </div>
                
                <!-- Registration Options -->
                <div class="register-options" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem;">
                    <a href="register.html?type=user" class="register-type active" style="text-align: center; padding: 1rem; border: 2px solid var(--primary); border-radius: 8px; text-decoration: none; color: var(--dark);">
                        <i class="fas fa-user" style="font-size: 2rem; color: var(--primary); margin-bottom: 0.5rem; display: block;"></i>
                        <h4>Customer</h4>
                        <small>Book rides</small>
                    </a>
                    <a href="driver/driver-register.html" class="register-type" style="text-align: center; padding: 1rem; border: 2px solid #ddd; border-radius: 8px; text-decoration: none; color: var(--dark);">
                        <i class="fas fa-taxi" style="font-size: 2rem; color: var(--gray); margin-bottom: 0.5rem; display: block;"></i>
                        <h4>Driver</h4>
                        <small>Earn money</small>
                    </a>
                </div>
                
                <!-- Registration Form -->
                <form id="register-form" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label>Full Name</label>
                        <div class="input-group">
                            <i class="fas fa-user"></i>
                            <input type="text" placeholder="Enter your full name" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Email Address</label>
                        <div class="input-group">
                            <i class="fas fa-envelope"></i>
                            <input type="email" placeholder="Enter your email" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Phone Number</label>
                        <div class="input-group">
                            <i class="fas fa-phone"></i>
                            <input type="tel" placeholder="10 digit mobile number" required>
                        </div>
                    </div>
                    
                    <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label>Password</label>
                            <div class="input-group">
                                <i class="fas fa-lock"></i>
                                <input type="password" id="password" required>
                                <i class="fas fa-eye toggle-password" onclick="togglePassword('password')"></i>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label>Confirm</label>
                            <div class="input-group">
                                <i class="fas fa-lock"></i>
                                <input type="password" id="confirm-password" required>
                                <i class="fas fa-eye toggle-password" onclick="togglePassword('confirm-password')"></i>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" required> I agree to the <a href="#">Terms & Conditions</a>
                        </label>
                    </div>
                    
                    <button type="submit" class="btn-login">Create Account</button>
                    
                    <div class="auth-footer">
                        Already have an account? <a href="login.html">Sign in</a>
                    </div>
                </form>
                
                <!-- Social Registration -->
                <div class="social-login">
                    <p>Or sign up with</p>
                    <div class="social-buttons">
                        <button class="social-btn google" onclick="socialRegister('google')">
                            <i class="fab fa-google"></i> Google
                        </button>
                        <button class="social-btn facebook" onclick="socialRegister('facebook')">
                            <i class="fab fa-facebook-f"></i> Facebook
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer"></div>

    <script src="js/main.js"></script>
    <script>
        function togglePassword(id) {
            const input = document.getElementById(id);
            const icon = event.target;
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
        
        function handleRegister(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;
            
            if (password !== confirm) {
                showNotification('Passwords do not match!', 'error');
                return;
            }
            
            showNotification('Creating account...', 'info');
            
            setTimeout(() => {
                showNotification('Registration successful! Please login.', 'success');
                window.location.href = 'login.html';
            }, 1500);
        }
        
        function socialRegister(provider) {
            showNotification(`Connecting with ${provider}...`, 'info');
            setTimeout(() => {
                showNotification('Registration successful!', 'success');
                window.location.href = 'login.html';
            }, 1500);
        }
    </script>
</body>
</html>
