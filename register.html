<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — RT QuickCab  Vadodara</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/navbar.css">
<link rel="stylesheet" href="css/responsive.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<header>
  <div class="nav-wrap">
    <a href="index.html" class="brand"><span class="mark"><i class="fas fa-taxi"></i></span><span>RT QuickCab <small>VADODARA · EST. 2026</small></span></a>
    <ul class="nav-menu" id="navMenu">
      <li><a href="index.html">Home</a></li>
      <li><a href="book-ride.html">Book Ride</a></li>
      <li><a href="fleet.html">Fleet</a></li>
      <li><a href="pricing.html">Pricing</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="nav-buttons">
      <a href="login.html" id="navAuthLink" class="btn btn-ghost btn-small">Sign in</a>
      <a href="book-ride.html" class="btn btn-gold btn-small">Book Now</a>
      <button class="hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
    </div>
  </div>
</header>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="mark"><i class="fas fa-taxi"></i></div>
      <h2>Create account</h2>
      <p>Join RT QuickCab  and start riding today</p>
    </div>

    <div class="register-options" style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.8rem;">
      <a href="#" class="register-type active" style="text-align:center;padding:1rem;border:2px solid var(--gold);border-radius:12px;">
        <i class="fas fa-user" style="font-size:1.6rem;color:var(--gold-dark);margin-bottom:.5rem;display:block;"></i>
        <h4 style="font-size:.92rem;">Customer</h4>
        <small style="color:var(--muted);">Book rides</small>
      </a>
      <a href="#" class="register-type" style="text-align:center;padding:1rem;border:2px solid var(--border);border-radius:12px;">
        <i class="fas fa-taxi" style="font-size:1.6rem;color:var(--muted);margin-bottom:.5rem;display:block;"></i>
        <h4 style="font-size:.92rem;">Driver</h4>
        <small style="color:var(--muted);">Earn money</small>
      </a>
    </div>

    <form id="register-form">
      <div class="field">
        <label>Full name</label>
        <div class="field-input"><i class="fas fa-user"></i><input type="text" id="reg-name" placeholder="Enter your full name" required></div>
      </div>
      <div class="field">
        <label>Email address</label>
        <div class="field-input"><i class="fas fa-envelope"></i><input type="email" id="reg-email" placeholder="Enter your email" required></div>
      </div>
      <div class="field">
        <label>Phone number</label>
        <div class="field-input"><i class="fas fa-phone"></i><input type="tel" id="reg-phone" placeholder="10-digit mobile number" required></div>
      </div>
      <div class="card-row">
        <div class="field">
          <label>Password</label>
          <div class="field-input">
            <i class="fas fa-lock"></i>
            <input type="password" id="reg-password" required>
            <i class="fas fa-eye toggle-password" onclick="toggleAuthPassword('reg-password', this)"></i>
          </div>
        </div>
        <div class="field">
          <label>Confirm</label>
          <div class="field-input">
            <i class="fas fa-lock"></i>
            <input type="password" id="confirm-password" required>
            <i class="fas fa-eye toggle-password" onclick="toggleAuthPassword('confirm-password', this)"></i>
          </div>
        </div>
      </div>

      <div class="form-options">
        <label class="remember-me"><input type="checkbox" required> I agree to the <a href="#">Terms &amp; Conditions</a></label>
      </div>

      <button type="submit" class="btn btn-gold btn-block">Create Account</button>

      <div class="auth-footer">Already have an account? <a href="login.html">Sign in</a></div>
    </form>

    <div class="social-login">
      <p>Or sign up with</p>
      <div class="social-buttons">
        <button class="social-btn google"><i class="fab fa-google"></i> Google</button>
        <button class="social-btn facebook"><i class="fab fa-facebook-f"></i> Facebook</button>
      </div>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script src="js/main.js"></script>
<script src="js/auth.js"></script>
<script>
  document.querySelectorAll('.register-type').forEach(opt => {
    opt.addEventListener('click', e => {
      e.preventDefault();
      document.querySelectorAll('.register-type').forEach(o => { o.style.borderColor = 'var(--border)'; o.classList.remove('active'); });
      opt.style.borderColor = 'var(--gold)';
      opt.classList.add('active');
    });
  });
</script>
</body>
</html>
