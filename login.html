<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — RT QuickCab  Vadodara</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/navbar.css">
<link rel="stylesheet" href="css/responsive.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<header>
  <div class="nav-wrap">
    <a href="index.html" class="brand"><span class="mark"><i class="fas fa-taxi"></i></span><span>RT QuickCab <small>VADODARA · EST. 2026</small></span></a>
    <ul class="nav-menu" id="navMenu">
      <li><a href="index.html">Home</a></li>
      <li><a href="book-ride.html">Book Ride</a></li>
      <li><a href="fleet.html">Fleet</a></li>
      <li><a href="pricing.html">Pricing</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="nav-buttons">
      <a href="register.html" id="navAuthLink" class="btn btn-ghost btn-small">Register</a>
      <a href="book-ride.html" class="btn btn-gold btn-small">Book Now</a>
      <button class="hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
    </div>
  </div>
</header>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="mark"><i class="fas fa-taxi"></i></div>
      <h2>Welcome back</h2>
      <p>Sign in to book your next ride</p>
    </div>

    <form id="login-form">
      <div class="field">
        <label>Email address</label>
        <div class="field-input"><i class="fas fa-envelope"></i><input type="email" id="email" placeholder="you@example.com" required></div>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="field-input">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" placeholder="Enter your password" required>
          <i class="fas fa-eye toggle-password" onclick="toggleAuthPassword('password', this)"></i>
        </div>
      </div>

      <div class="form-options">
        <label class="remember-me"><input type="checkbox"> Remember me</label>
        <a href="#">Forgot password?</a>
      </div>

      <button type="submit" class="btn btn-gold btn-block">Sign In</button>

      <div class="auth-footer">Don't have an account? <a href="register.html">Create one</a></div>
    </form>

    <div class="social-login">
      <p>Or continue with</p>
      <div class="social-buttons">
        <button class="social-btn google"><i class="fab fa-google"></i> Google</button>
        <button class="social-btn facebook"><i class="fab fa-facebook-f"></i> Facebook</button>
      </div>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script src="js/main.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
