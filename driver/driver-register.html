<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Registration - QuickCab</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="navbar"></div>

    <section class="driver-register-page">
        <div class="container">
            <h1 class="page-title">Become a <span>Driver Partner</span></h1>
            <p class="page-subtitle">Earn up to ₹50,000 per month by driving with QuickCab</p>

            <div class="register-form-container">
                <form id="driver-register-form">
                    <div class="form-section">
                        <h3>Personal Information</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Full Name</label>
                                <input type="text" placeholder="As per license" required>
                            </div>
                            <div class="form-group">
                                <label>Phone Number</label>
                                <input type="tel" placeholder="10 digit mobile number" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Email Address</label>
                                <input type="email" placeholder="your@email.com" required>
                            </div>
                            <div class="form-group">
                                <label>Date of Birth</label>
                                <input type="date" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3>License & Documents</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Driver's License Number</label>
                                <input type="text" placeholder="Enter license number" required>
                            </div>
                            <div class="form-group">
                                <label>License Expiry Date</label>
                                <input type="date" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3>Vehicle Details</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Vehicle Type</label>
                                <select required>
                                    <option value="">Select vehicle type</option>
                                    <option value="mini">Mini</option>
                                    <option value="sedan">Sedan</option>
                                    <option value="suv">SUV</option>
                                    <option value="luxury">Luxury</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Car Number</label>
                                <input type="text" placeholder="RJ-14-AB-1234" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Car Model</label>
                                <input type="text" placeholder="e.g., Maruti Swift" required>
                            </div>
                            <div class="form-group">
                                <label>Year of Manufacture</label>
                                <input type="number" placeholder="2020" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3>Upload Documents</h3>
                        <div class="upload-grid">
                            <div class="upload-box">
                                <i class="fas fa-id-card"></i>
                                <p>Driver's License (Front)</p>
                                <input type="file" accept="image/*">
                            </div>
                            <div class="upload-box">
                                <i class="fas fa-id-card"></i>
                                <p>Driver's License (Back)</p>
                                <input type="file" accept="image/*">
                            </div>
                            <div class="upload-box">
                                <i class="fas fa-file-alt"></i>
                                <p>RC Book</p>
                                <input type="file" accept="image/*">
                            </div>
                            <div class="upload-box">
                                <i class="fas fa-shield-alt"></i>
                                <p>Insurance</p>
                                <input type="file" accept="image/*">
                            </div>
                        </div>
                    </div>

                    <div class="form-checkbox">
                        <input type="checkbox" id="terms" required>
                        <label for="terms">I confirm that all information provided is correct and I agree to the terms and conditions</label>
                    </div>

                    <button type="submit" class="btn-primary btn-block">Submit Registration</button>
                </form>
            </div>
        </div>
    </section>

    <div id="footer"></div>
    <script src="../js/main.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
