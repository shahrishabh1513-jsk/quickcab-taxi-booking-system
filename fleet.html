<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Fleet - QuickCab</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="navbar"></div>

    <section class="fleet-page">
        <div class="container">
            <h1 class="page-title">Our <span>Fleet</span></h1>
            <p class="page-subtitle">Choose from our wide range of vehicles</p>

            <div class="fleet-grid-large">
                <!-- Mini -->
                <div class="fleet-card">
                    <div class="car-image">
                        <img src="images/taxi1.png" alt="Mini">
                        <span class="car-badge">Best Seller</span>
                    </div>
                    <div class="car-details">
                        <h3>Mini</h3>
                        <div class="car-specs">
                            <span><i class="fas fa-users"></i> 4 Seats</span>
                            <span><i class="fas fa-snowflake"></i> AC</span>
                            <span><i class="fas fa-gas-pump"></i> Petrol</span>
                        </div>
                        <div class="car-price">
                            <span class="price">₹10/km</span>
                            <a href="book-ride.html" class="btn-primary">Book Now</a>
                        </div>
                    </div>
                </div>

                <!-- Sedan -->
                <div class="fleet-card">
                    <div class="car-image">
                        <img src="images/taxi2.png" alt="Sedan">
                    </div>
                    <div class="car-details">
                        <h3>Sedan</h3>
                        <div class="car-specs">
                            <span><i class="fas fa-users"></i> 4 Seats</span>
                            <span><i class="fas fa-snowflake"></i> AC</span>
                            <span><i class="fas fa-gas-pump"></i> Diesel</span>
                        </div>
                        <div class="car-price">
                            <span class="price">₹14/km</span>
                            <a href="book-ride.html" class="btn-primary">Book Now</a>
                        </div>
                    </div>
                </div>

                <!-- SUV -->
                <div class="fleet-card">
                    <div class="car-image">
                        <img src="images/taxi1.png" alt="SUV">
                    </div>
                    <div class="car-details">
                        <h3>SUV</h3>
                        <div class="car-specs">
                            <span><i class="fas fa-users"></i> 6 Seats</span>
                            <span><i class="fas fa-snowflake"></i> AC</span>
                            <span><i class="fas fa-gas-pump"></i> Diesel</span>
                        </div>
                        <div class="car-price">
                            <span class="price">₹18/km</span>
                            <a href="book-ride.html" class="btn-primary">Book Now</a>
                        </div>
                    </div>
                </div>

                <!-- Luxury -->
                <div class="fleet-card">
                    <div class="car-image">
                        <img src="images/taxi2.png" alt="Luxury">
                        <span class="car-badge premium">Premium</span>
                    </div>
                    <div class="car-details">
                        <h3>Luxury Sedan</h3>
                        <div class="car-specs">
                            <span><i class="fas fa-users"></i> 4 Seats</span>
                            <span><i class="fas fa-snowflake"></i> Premium AC</span>
                            <span><i class="fas fa-gas-pump"></i> Petrol</span>
                        </div>
                        <div class="car-price">
                            <span class="price">₹25/km</span>
                            <a href="book-ride.html" class="btn-primary">Book Now</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="footer"></div>
    <script src="js/main.js"></script>
</body>
</html>
